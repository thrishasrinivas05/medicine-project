<!DOCTYPE html>
<html>
<head>
<title>Medicine System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/*  MEDICAL BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background: linear-gradient(135deg, #00c6ff, #0072ff, #00ff99);
background-size:400% 400%;
animation: bgMove 10s ease infinite;
}

/* Smooth animated gradient */
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Glass Card */
.box{
background: rgba(255,255,255,0.12);
backdrop-filter: blur(20px);
border-radius:20px;
padding:30px;
width:320px;
text-align:center;
color:white;
box-shadow:0 8px 40px rgba(0,0,0,0.3);
transform: perspective(800px) rotateX(5deg);
}

/* Inputs */
input{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:8px;
outline:none;
}

/* Buttons */
button{
width:95%;
padding:12px;
border:none;
border-radius:8px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0072ff;
transform:scale(1.05);
}

/* Toggle text */
.toggle{
margin-top:10px;
font-size:14px;
cursor:pointer;
}

/* Hide forms */
.hidden{
display:none;
}
</style>

</head>

<body>

<div class="box">

<h2 id="title">Register</h2>
<p style="color:red;">{{ error }}</p>
<p style="color:lightgreen;">{{ success }}</p>

<!-- REGISTER -->
<form id="registerForm" action="/register" method="post">
<input name="name" placeholder="Name" required>
<input name="email" placeholder="Email" required>
<input name="phone" placeholder="Phone" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Register</button>
</form>

<!-- LOGIN -->
<form id="loginForm" class="hidden" action="/login" method="post">
<input name="email" placeholder="Email" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<p class="toggle" onclick="toggleForm()">Already have account? Login</p>

</div>

<script>
let isLogin = false;

function toggleForm(){
isLogin = !isLogin;

document.getElementById("registerForm").classList.toggle("hidden");
document.getElementById("loginForm").classList.toggle("hidden");

document.getElementById("title").innerText =
isLogin ? "Login" : "Register";

document.querySelector(".toggle").innerText =
isLogin ? "Don't have account? Register" : "Already have account? Login";
}
</script>

</body>
</html>
